<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات الذكية - مراجعة الأخطاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class', // تفعيل الوضع الليلي عبر الكلاس
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white dark:bg-slate-800 border-b-2 dark:border-slate-700 p-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2">
                <a href="../index.html" class="p-2 bg-slate-100 dark:bg-slate-700 rounded-xl hover:bg-blue-100 dark:hover:bg-blue-900 transition-all" title="الرئيسية">
                    🏠
                </a>
                <button onclick="toggleDarkMode()" class="p-2 bg-slate-100 dark:bg-slate-700 rounded-xl hover:bg-yellow-100 dark:hover:bg-yellow-900 transition-all">
                    🌓
                </button>
            </div>

            <div class="flex-1 h-4 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden max-w-md hidden md:block">
                <div id="progress-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="flex items-center gap-3">
                <div id="mode-badge" class="bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-100 px-3 py-1 rounded-full text-xs font-bold">وضع الاختبار</div>
                <button id="exit-review-btn" onclick="exitReview()" class="hidden bg-red-100 text-red-600 dark:bg-red-900 dark:text-red-100 px-4 py-2 rounded-xl font-bold text-sm hover:bg-red-200">
                    إنهاء المراجعة ✕
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-6">
        <aside class="w-full md:w-64 order-2 md:order-1">
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-md border-b-4 border-slate-200 dark:border-slate-700">
                <h3 class="font-bold mb-4 text-blue-900 dark:text-blue-400">الأسئلة 1-25</h3>
                <div id="question-grid" class="grid grid-cols-5 gap-2 max-h-96 overflow-y-auto p-1">
                    </div>
            </div>
        </aside>

        <section class="flex-1 order-1 md:order-2">
            <div id="exam-card" class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-xl border-b-8 border-slate-200 dark:border-slate-700">
                <div id="question-content">
                    <span id="q-number" class="text-slate-400 font-bold text-xl block mb-2"></span>
                    <h2 id="q-text" class="en text-2xl font-black text-slate-700 dark:text-white mb-8 leading-relaxed"></h2>
                    <div id="options-list" class="space-y-4">
                        </div>
                </div>
            </div>

            <div class="mt-8 flex justify-between items-center">
                <button onclick="prevQuestion()" id="prev-btn" class="px-8 py-3 bg-white dark:bg-slate-700 border-2 dark:border-slate-600 text-slate-500 dark:text-slate-300 rounded-2xl font-bold transition-all hover:bg-slate-50">السابق</button>
                <button onclick="handleNext()" id="next-btn" class="px-12 py-3 bg-blue-900 dark:bg-blue-700 text-white rounded-2xl font-bold text-xl shadow-lg hover:scale-105 transition-all">التالي</button>
            </div>
        </section>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
    <div class="bg-white dark:bg-slate-800 p-8 md:p-12 rounded-[3rem] max-w-lg w-full text-center shadow-2xl transform transition-all scale-110 border-b-[12px] border-blue-900 dark:border-yellow-500">
        
        <div class="relative inline-block mb-6">
            <div class="text-8xl animate-bounce">🏆</div>
            <div class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold animate-pulse">EXCELLENT</div>
        </div>

        <h2 class="text-3xl font-black mb-2 dark:text-white">أحسنت! لقد أنهيت الاختبار</h2>
        <p class="text-slate-500 dark:text-slate-400 mb-6">لقد حققت نتيجة رائعة، استمر في التقدم!</p>

        <div class="bg-slate-50 dark:bg-slate-700/50 rounded-3xl py-6 mb-8 border-2 border-dashed border-slate-200 dark:border-slate-600">
            <div class="text-sm uppercase font-bold text-slate-400 mb-1">نتيجتك النهائية</div>
            <div class="text-6xl font-black text-blue-900 dark:text-yellow-500" id="final-result-text">0/25</div>
        </div>

        <div class="grid grid-cols-1 gap-3">
            <a href="ans4 - Copy.html" class="w-full bg-blue-900 hover:bg-blue-800 text-white py-4 rounded-2xl font-black text-xl shadow-lg transition-all hover:scale-[1.02] flex items-center justify-center gap-2">
                🚀 الانتقال للجزء الثاني
            </a>
            
            <div class="flex gap-2">
                <button onclick="startReview()" class="flex-1 bg-green-500 hover:bg-green-400 text-white py-3 rounded-2xl font-bold transition-all">
                    مراجعة الأخطاء
                </button>
                <button onclick="location.reload()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-3 rounded-2xl font-bold transition-all">
                    إعادة الاختبار
                </button>
            </div>
        </div>
    </div>
</div>

<audio id="success-sound" src="https://www.myinstants.com/media/sounds/success-fanfare-trumpets.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="4.js"></script>
</body>
</html>
